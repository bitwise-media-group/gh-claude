# Keep module deps, pinned dev tools, and SHA-pinned actions fresh.
version: 2
updates:
    - package-ecosystem: gomod
      directory: /
      cooldown:
          default-days: 7
      commit-message:
          include: scope
          prefix: deps
          prefix-development: deps
      schedule:
          interval: daily

    - package-ecosystem: gomod
      directory: /tools
      # The pinned tools sit in `tool (...)` directives, so every require entry is
      # `// indirect`. Dependabot only updates direct deps by default, so allow
      # indirect ones too or these updates would never fire.
      allow:
          - dependency-type: all
      cooldown:
          default-days: 7
      commit-message:
          include: scope
          prefix: build
          prefix-development: build
      schedule:
          interval: daily
      groups:
          tools:
              patterns: ["*"]

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: daily
      commit-message:
          prefix: build
          prefix-development: build
          include: scope
      cooldown:
          default-days: 7
          # our own actions ship straight through — no cooldown wait
          exclude:
              - bitwise-media-group/*
      groups:
          actions:
              patterns:
                  - actions/*
          github:
              patterns:
                  - github/*
          bitwise-media-group:
              patterns:
                  - bitwise-media-group/*
